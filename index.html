<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Caderno de Campo · Paulo Xavier</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#090d16">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Caderno Psi">
  
  <link rel="icon" type="image/svg+xml" href="img/icone-psi.svg">
  <link rel="apple-touch-icon" href="img/icone-psi.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-text">
        <strong>Caderno de Campo</strong>
        <span>Paulo Xavier · Psicólogo</span>
      </div>
    </div>

    <nav class="tabs" id="filterTabs">
      <button class="tab active" data-filter="todos">
        <span class="tab-label">Todos os registros</span>
        <span class="tab-count" id="count-todos">0</span>
      </button>
      <button class="tab" data-filter="visita">
        <span class="tab-label">Visitas</span>
        <span class="tab-count" id="count-visita">0</span>
      </button>
      <button class="tab" data-filter="pesquisa">
        <span class="tab-label">Pesquisas</span>
        <span class="tab-count" id="count-pesquisa">0</span>
      </button>
      <button class="tab" data-filter="atividade">
        <span class="tab-label">Atividades técnicas</span>
        <span class="tab-count" id="count-atividade">0</span>
      </button>
      <button class="tab" data-filter="pendente">
        <span class="tab-label">Acompanhamento</span>
        <span class="tab-count" id="count-pendente">0</span>
      </button>
    </nav>

    <div class="sidebar-footer">
      <div class="export-actions">
        <button class="ghost-btn" id="exportJsonBtn">Exportar JSON</button>
        <button class="ghost-btn" id="exportCsvBtn">Exportar CSV</button>
        <button class="ghost-btn" id="exportWordBtn" style="color: #6366f1;">Exportar Word</button>
        <button class="ghost-btn" id="exportPdfBtn" style="color: #ff007f;">Exportar PDF</button>
      </div>
      
      <label class="ghost-btn" for="importFile" style="text-align: center; display: block; cursor: pointer; margin-top: 8px;">Importar Backup</label>
      <input type="file" id="importFile" accept="application/json" hidden>
      <p class="local-note">Dados salvos localmente no dispositivo.</p>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="search-wrap">
        <input type="search" id="searchInput" placeholder="Buscar por local, caso, tag...">
      </div>
      <button class="primary-btn" id="newEntryBtn">+ Novo registro</button>
    </header>

    <section class="list-wrap">
      <div id="emptyState" class="empty-state">
        <div class="empty-stamp">Ψ</div>
        <h2>Nenhum registro</h2>
        <p>Inicie mapeando a sua primeira atividade prática ou caso clínico.</p>
        <button class="primary-btn" id="emptyNewEntryBtn">+ Novo registro</button>
      </div>
      <div id="entryList" class="entry-list"></div>
    </section>
  </main>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <form class="modal" id="entryForm">
    <div class="modal-head">
      <h2 id="modalTitle">Novo registro</h2>
      <button type="button" class="icon-btn" id="closeModalBtn">×</button>
    </div>

    <input type="hidden" id="entryId">
    <input type="hidden" id="entryLat">
    <input type="hidden" id="entryLng">

    <div class="field-row">
      <div class="field">
        <label for="entryType">Tipo de registro</label>
        <select id="entryType" required>
          <option value="visita">Visita</option>
          <option value="pesquisa">Pesquisa</option>
          <option value="atividade">Atividade técnica</option>
        </select>
      </div>
      <div class="field">
        <label for="entryDate">Data</label>
        <input type="date" id="entryDate" required>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label for="entryLocation">Local / Instituição</label>
        <div style="display:flex; gap:6px; align-items:center;">
          <input type="text" id="entryLocation" placeholder="Ex.: UBS Centro, Residência..." style="flex:1;">
          <button type="button" id="getLocationBtn" class="ghost-btn" title="Usar localização atual (GPS)" style="flex-shrink:0; padding:8px 10px;">📍</button>
        </div>
      </div>
      <div class="field">
        <label for="entryCode">Código do Caso / Sujeito</label>
        <input type="text" id="entryCode" placeholder="Ex.: Caso #402">
      </div>
    </div>

    <div class="field">
      <label for="entrySummary">Resumo da Atividade</label>
      <input type="text" id="entrySummary" placeholder="Título descritivo rápido" required>
    </div>

    <div class="field">
      <label for="entryDetails">Observações Clínicas e Técnicas</label>
      <textarea id="entryDetails" rows="5" placeholder="Descrição minuciosa dos acontecimentos..."></textarea>
    </div>

    <div class="field-row">
      <div class="field">
        <label for="entryTags">Tags <span class="hint">(separadas por vírgula)</span></label>
        <input type="text" id="entryTags" placeholder="Ex.: evolutivo, anamnese">
      </div>
      <div class="field">
        <label for="entryStatus">Status</label>
        <select id="entryStatus">
          <option value="concluido">Concluído</option>
          <option value="acompanhamento">Acompanhamento pendente</option>
          <option value="planejado">Planejado</option>
        </select>
      </div>
    </div>

    <div class="modal-actions">
      <button type="button" class="ghost-btn" id="deleteEntryBtn" style="display:none;">Excluir</button>
      <div class="spacer"></div>
      <button type="button" class="ghost-btn" id="cancelModalBtn">Cancelar</button>
      <button type="submit" class="primary-btn">Salvar Registro</button>
    </div>
  </form>
</div>

<script src="js/app.js"></script>
</body>
</html>
